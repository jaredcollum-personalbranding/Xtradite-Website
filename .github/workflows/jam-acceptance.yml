name: Jam refinement acceptance

on:
  push:
    branches:
      - feat/jam-work-packages-57-62
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: jam-acceptance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  acceptance:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install project and browser test dependencies
        run: |
          npm install
          npm install --no-save playwright@1.53.2 http-server@14.1.1 wait-on@8.0.3
          npx playwright install --with-deps chromium

      - name: Build and validate frontend
        run: npm run build

      - name: Start local frontend
        run: |
          npx http-server frontend -p 4173 -c-1 > /tmp/xtradite-http-server.log 2>&1 &
          npx wait-on http://127.0.0.1:4173 --timeout 30000

      - name: Run eight-viewport, interaction and reduced-motion suite
        run: node scripts/run-jam-acceptance.mjs

      - name: Upload acceptance report, screenshots and generated source
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jam-acceptance-${{ github.sha }}
          path: |
            artifacts/jam-acceptance
            frontend/assets/js/site.js
            frontend/index.html
          if-no-files-found: warn
          retention-days: 30
