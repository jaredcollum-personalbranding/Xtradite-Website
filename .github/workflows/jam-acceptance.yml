name: Jam refinement acceptance

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: jam-acceptance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  acceptance:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install project and browser test dependencies
        run: |
          npm install --no-audit --no-fund
          npm install --no-save --no-audit --no-fund playwright@1.53.2 http-server@14.1.1 wait-on@8.0.3
          npx playwright install --with-deps chromium

      - name: Build and validate frontend
        shell: bash
        run: |
          mkdir -p artifacts/jam-acceptance
          set -o pipefail
          npm run build 2>&1 | tee artifacts/jam-acceptance/build.log

      - name: Start local frontend
        run: |
          npx http-server frontend -p 4173 -c-1 > /tmp/xtradite-http-server.log 2>&1 &
          npx wait-on http://127.0.0.1:4173 --timeout 30000

      - name: Run eight-viewport, interaction and reduced-motion suite
        run: node scripts/run-jam-acceptance.mjs

      - name: Capture complete menu and technology evidence
        run: node scripts/capture-jam-required-screenshots.mjs

      - name: Run keyboard, contrast and touch-target suite
        run: node scripts/run-jam-accessibility.mjs

      - name: Upload acceptance report and screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jam-acceptance-${{ github.sha }}
          path: |
            artifacts/jam-acceptance
            frontend/index.html
          if-no-files-found: warn
          retention-days: 30
