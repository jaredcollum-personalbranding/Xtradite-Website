name: One-time final branch cleanup

on:
  pull_request:
    branches:
      - chore/branch-and-pipeline-cleanup

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Delete final obsolete branch and record inventory
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          gh api -X DELETE "repos/${GITHUB_REPOSITORY}/git/refs/heads/fix/case-study-detail-rendering"

          mapfile -t branches < <(
            gh api --paginate "repos/${GITHUB_REPOSITORY}/branches?per_page=100" --jq '.[].name'
          )

          body="## Final branch inventory\n\nRemaining before the temporary audit branch removes itself: **${#branches[@]}**\n"
          for branch in "${branches[@]}"; do
            body+="\n- \`${branch}\`"
          done

          printf '%b\n' "$body"
          gh pr comment 72 --repo "$GITHUB_REPOSITORY" --body "$(printf '%b' "$body")"

      - name: Remove temporary audit branch
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api -X DELETE "repos/${GITHUB_REPOSITORY}/git/refs/heads/chore/audit-branch-inventory"
