name: Dedupe consent and load AdSense

on:
  push:
    branches:
      - fix/dedupe-consent-and-load-adsense
    paths:
      - '.github/workflows/dedupe-consent-and-load-adsense.yml'

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/dedupe-consent-and-load-adsense

      - name: Clean consent headers and validate AdSense loading
        shell: python
        run: |
          from pathlib import Path
          import re

          CANONICAL = '''<meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <meta name="google-adsense-account" content="ca-pub-7308041122340160">

          <!-- Google Consent Mode defaults: must run before Cookiebot and Google tags -->
          <script>
            window.dataLayer = window.dataLayer || [];

            function gtag() {
              dataLayer.push(arguments);
            }

            gtag("consent", "default", {
              ad_storage: "denied",
              ad_user_data: "denied",
              ad_personalization: "denied",
              analytics_storage: "denied",
              functionality_storage: "denied",
              personalization_storage: "denied",
              security_storage: "granted",
              wait_for_update: 500
            });

            gtag("set", "ads_data_redaction", true);
            gtag("set", "url_passthrough", false);
          </script>

          <!-- Cookiebot CMP -->
          <script
            id="Cookiebot"
            src="https://consent.cookiebot.com/uc.js"
            data-cbid="07680bbc-6c7e-4a44-9d8b-a2ff6766646c"
            data-blockingmode="auto"
            data-framework="IAB"
            type="text/javascript"
          ></script>

          <!-- Synchronise genuine Cookiebot choices with Google Consent Mode -->
          <script>
            function updateGoogleConsentFromCookiebot() {
              if (!window.Cookiebot || !Cookiebot.hasResponse) {
                return;
              }

              const marketingGranted = Cookiebot.consent.marketing === true;
              const statisticsGranted = Cookiebot.consent.statistics === true;
              const preferencesGranted = Cookiebot.consent.preferences === true;

              gtag("consent", "update", {
                ad_storage: marketingGranted ? "granted" : "denied",
                ad_user_data: marketingGranted ? "granted" : "denied",
                ad_personalization: marketingGranted ? "granted" : "denied",
                analytics_storage: statisticsGranted ? "granted" : "denied",
                functionality_storage: preferencesGranted ? "granted" : "denied",
                personalization_storage: preferencesGranted ? "granted" : "denied",
                security_storage: "granted"
              });

              gtag("set", "ads_data_redaction", !marketingGranted);
            }

            window.addEventListener("CookiebotOnConsentReady", updateGoogleConsentFromCookiebot);
            window.addEventListener("CookiebotOnAccept", updateGoogleConsentFromCookiebot);
            window.addEventListener("CookiebotOnDecline", updateGoogleConsentFromCookiebot);
          </script>

          <!-- Google Analytics -->
          <script async src="https://www.googletagmanager.com/gtag/js?id=G-WYXTKGJ9JS"></script>
          <script>
            gtag("js", new Date());
            gtag("config", "G-WYXTKGJ9JS");
          </script>

          <!-- Google AdSense -->
          <script
            async
            data-cookieconsent="ignore"
            src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7308041122340160"
            crossorigin="anonymous"
          ></script>

          '''

          marker = '<!-- Vercel Speed Insights -->'
          changed = []

          for path in sorted(Path('frontend').rglob('*.html')):
            text = path.read_text(encoding='utf-8-sig')
            head_start = text.find('<head>')
            marker_pos = text.find(marker)
            if head_start == -1 or marker_pos == -1:
              raise SystemExit(f'Cannot identify consent header boundary in {path}')

            suffix = text[marker_pos:]
            text = text[:head_start + len('<head>')] + '\n' + CANONICAL + suffix

            # Require an actual Cookiebot response before page-level ad scripts initialise units.
            text = re.sub(
              r"window\.Cookiebot\s*&&\s*window\.Cookiebot\.consent\s*&&\s*window\.Cookiebot\.consent\.marketing",
              "window.Cookiebot && Cookiebot.hasResponse && Cookiebot.consent && Cookiebot.consent.marketing",
              text,
            )

            # Also tighten the common multiline variant.
            text = re.sub(
              r"window\.Cookiebot\s*&&\s*\n\s*window\.Cookiebot\.consent\s*&&\s*\n\s*window\.Cookiebot\.consent\.marketing",
              "window.Cookiebot &&\n        Cookiebot.hasResponse &&\n        Cookiebot.consent &&\n        Cookiebot.consent.marketing",
              text,
            )

            path.write_text(text, encoding='utf-8')
            changed.append(path)

          errors = []
          for path in changed:
            text = path.read_text(encoding='utf-8')
            checks = {
              'Consent Mode default': text.count('gtag("consent", "default"') == 1,
              'Cookiebot loader': text.count('id="Cookiebot"') == 1,
              'Cookiebot auto blocking': text.count('data-blockingmode="auto"') == 1,
              'Cookiebot IAB': text.count('data-framework="IAB"') == 1,
              'Consent bridge': text.count('function updateGoogleConsentFromCookiebot()') == 1,
              'GA4 loader': text.count('googletagmanager.com/gtag/js?id=G-WYXTKGJ9JS') == 1,
              'AdSense loader': text.count('pagead2.googlesyndication.com/pagead/js/adsbygoogle.js') == 1,
              'AdSense ignore marker': text.count('data-cookieconsent="ignore"') >= 1,
              'No text/plain Google loaders': 'type="text/plain"' not in text,
            }
            for name, passed in checks.items():
              if not passed:
                errors.append(f'{path}: {name}')

          if errors:
            raise SystemExit('\n'.join(errors))

          print(f'Updated and validated {len(changed)} frontend HTML files')

      - name: Commit migrated templates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend
          if git diff --cached --quiet; then
            echo "No changes required"
          else
            git commit -m "Remove duplicate consent blocks and unblock AdSense loader"
            git push origin HEAD:fix/dedupe-consent-and-load-adsense
          fi
