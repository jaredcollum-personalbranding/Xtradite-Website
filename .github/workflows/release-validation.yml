name: Remove temporary release validation branch

on:
  pull_request:
    branches:
      - main
    types:
      - closed

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete temporary validation branch
        if: github.event.pull_request.head.ref == 'release/validate-5e9597d'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api -X DELETE "repos/${GITHUB_REPOSITORY}/git/refs/heads/release/validate-5e9597d"
