name: Repair dependency lockfile

on:
  pull_request:
    branches:
      - main
    paths:
      - package.json
      - package-lock.json
      - .github/workflows/lockfile-bootstrap.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  lockfile:
    if: github.event_name == 'workflow_dispatch' || github.head_ref == 'feat/bulk-open-issues'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out bulk branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Repair lockfile when frozen install fails
        shell: bash
        run: |
          set -euo pipefail
          if npm ci --ignore-scripts --no-audit --no-fund >/tmp/npm-ci.log 2>&1; then
            echo "package-lock.json is already in sync"
            exit 0
          fi

          cat /tmp/npm-ci.log
          npm install --package-lock-only --ignore-scripts --no-audit --no-fund

          if git diff --quiet -- package-lock.json; then
            echo "npm reported lock drift but generated no package-lock change"
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "Synchronise package lock for frozen installs"
          git push origin HEAD:${{ github.event.pull_request.head.ref || github.ref_name }}
