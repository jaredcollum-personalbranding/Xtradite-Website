name: Apply mobile responsive stylesheet

on:
  push:
    branches:
      - feat/mobile-responsive-tidy
    paths:
      - .github/workflows/apply-mobile-responsive.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/mobile-responsive-tidy
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Add mobile stylesheet to all templates
        run: python scripts/apply_mobile_css.py

      - name: Validate links
        run: |
          python - <<'PY'
          from pathlib import Path
          pages = list(Path('frontend').rglob('*.html'))
          missing = [str(p) for p in pages if 'mobile.css' not in p.read_text(encoding='utf-8')]
          if missing:
              raise SystemExit('Missing mobile stylesheet: ' + ', '.join(missing))
          print(f'Validated {len(pages)} templates')
          PY

      - name: Commit generated template changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend scripts/apply_mobile_css.py
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Apply mobile responsive design site wide"
            git push origin feat/mobile-responsive-tidy
          fi
