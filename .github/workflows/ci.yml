name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Unit tests
        run: npm run test:unit

      - name: Integration tests
        run: npm run test:integration

      - name: Type and syntax checks
        run: npm run typecheck

      - name: Lint publication controls
        run: npm run lint

      - name: Verify routes
        run: npm run check:routes

      - name: Verify sitemap
        run: npm run check:sitemap

      - name: Verify structured data
        run: npm run check:structured-data

      - name: Verify migrations
        run: npm run check:migration

      - name: Verify service evidence
        run: npm run check:service-evidence

      - name: Verify case-study evidence
        run: npm run check:case-study-evidence

      - name: Verify service template
        run: npm run check:service-template

      - name: Verify Jam remediation
        run: npm run check:jam-remediation

      - name: Build Jam metadata
        run: npm run build:jam

      - name: Inject Jam recorder
        run: node scripts/inject-jam.js

      - name: Build SEO output
        run: npm run build:seo

      - name: Validate Jam foundation
        run: npm run validate:jam
