name: Production release quality

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund

      - name: Unit tests
        run: npm run test:unit
      - name: Integration tests
        run: npm run test:integration
      - name: Rendering tests
        run: npm run test:rendering
      - name: Typecheck
        run: npm run typecheck
      - name: Lint publication controls
        run: npm run lint
      - name: Route controls
        run: npm run check:routes
      - name: Sitemap controls
        run: npm run check:sitemap
      - name: Structured data controls
        run: npm run check:structured-data
      - name: Migration controls
        run: npm run check:migration
      - name: Service evidence controls
        run: npm run check:service-evidence
      - name: Case study evidence controls
        run: npm run check:case-study-evidence
      - name: Service template controls
        run: npm run check:service-template
      - name: Jam remediation controls
        run: npm run check:jam-remediation

      - name: Upload readable and machine-readable reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-release-quality-${{ github.sha }}
          path: |
            artifacts/release-quality
            artifacts/seo-release-quality
          if-no-files-found: warn
          retention-days: 30
