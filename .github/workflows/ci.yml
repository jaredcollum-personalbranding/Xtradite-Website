name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run production build and verification suite
        shell: bash
        run: |
          set -o pipefail
          npm run build 2>&1 | tee ci-build.log

      - name: Upload CI build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-build-${{ github.sha }}
          path: ci-build.log
          if-no-files-found: warn
          retention-days: 14
