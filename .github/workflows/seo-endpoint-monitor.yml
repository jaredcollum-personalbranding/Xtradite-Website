name: SEO endpoint monitor

on:
  schedule:
    - cron: "17,47 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Check canonical SEO endpoints twice before failing
        env:
          SEO_MONITOR_ATTEMPTS: "2"
          SEO_MONITOR_RETRY_DELAY_MS: "15000"
          SEO_RESPONSE_LIMIT_MS: "5000"
        run: node scripts/monitor-seo-endpoints.js

      - name: Upload monitor report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seo-endpoint-monitor-${{ github.run_id }}
          path: artifacts/seo-monitor
          if-no-files-found: error
          retention-days: 30
